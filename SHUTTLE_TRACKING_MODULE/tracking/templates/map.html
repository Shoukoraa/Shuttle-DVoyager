<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Shuttle Tracking</title>

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.13.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.13.0/mapbox-gl.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f0f2f5; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        .trip-selector {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 280px;
        }

        .trip-details {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: white; padding: 20px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 450px;
            display: none; transition: 0.3s;
        }

        .vehicle-marker {
            width: 40px; height: 40px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/3448/3448339.png');
            background-size: cover;
            cursor: pointer;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .status-badge {
            padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700;
        }
        .status-ON_GOING { background: #E3F2FD; color: #0D47A1; }
        .status-SCHEDULED { background: #F5F5F5; color: #666; }

        .btn-select {
            width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px;
            border: 1px solid #eee; background: #fff; cursor: pointer; text-align: left;
            transition: 0.2s;
        }
        .btn-select:hover { background: #f0f7ff; border-color: #0066FF; }

        .simulator-panel {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;
            display: none;
        }

        .btn-sim {
            background: #0066FF; color: white; border: none; padding: 8px 15px;
            border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%;
        }

        .shuttle-marker {
            width: 35px; height: 35px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/3063/3063822.png');
            background-size: cover; cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(0, 102, 255, 0.4));
        }
        .shuttle-marker::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background: rgba(0, 102, 255, 0.3);
            animation: markerPulse 2s infinite; z-index: -1;
        }
        @keyframes markerPulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .map-style-toggle {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: white; border-radius: 12px; padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; gap: 5px;
        }
        .style-btn {
            padding: 8px 14px; border-radius: 8px; border: none; font-family: inherit;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
            background: none; color: #666;
        }
        .style-btn.active { background: #0066FF; color: white; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="map-style-toggle">
        <button class="style-btn active" id="btnStreet" onclick="setMapStyle('streets')">🗺 Peta</button>
        <button class="style-btn" id="btnSatellite" onclick="setMapStyle('satellite')">🛰 Satelit</button>
        <button class="style-btn" id="btnDark" onclick="setMapStyle('dark')">🌙 Malam</button>
        <button class="style-btn" id="btnTraffic" onclick="toggleTraffic()">🚦 Lalu Lintas</button>
        <button class="style-btn" id="btn3D" onclick="toggle3D()" style="background: #10b981; color: white;">🏙️ 3D</button>
    </div>

    <div id="lightControls" style="display: none; position: absolute; top: 80px; right: 20px; z-index: 10; background: white; border-radius: 12px; padding: 6px; gap: 6px; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee;">
        <span style="font-size: 10px; font-weight: 800; color: #94a3b8; margin: 0 4px;">TEMA 3D:</span>
        <button id="lBtnDay" onclick="set3DLight('day')" style="font-size: 11px; padding: 6px 12px; background: #fef08a; color: #854d0e; border: 1px solid #fde047; border-radius: 8px; cursor: pointer; font-weight: 700;">☀️ Pagi</button>
        <button id="lBtnNight" onclick="set3DLight('dusk')" style="font-size: 11px; padding: 6px 12px; background: #312e81; color: white; border: 1px solid #3730a3; border-radius: 8px; cursor: pointer; font-weight: 700;">🌙 Malam</button>
    </div>

    <div class="trip-selector">
        <h3 style="margin-top: 0; font-size: 18px;">Fleet Monitor</h3>
        <div id="tripList" style="max-height: 300px; overflow-y: auto;">Memuat armada...</div>
    </div>
    
    <div id="infoCard" style="display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; background: white; padding: 15px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; display: flex; gap: 20px; align-items: center;">
        <div style="text-align: center;">
            <div style="font-size: 12px; color: #666; font-weight: 600;">JARAK</div>
            <div id="infoDistance" style="font-size: 18px; font-weight: 800; color: #0066FF;">0 km</div>
        </div>
        <div style="width: 1px; height: 30px; background: #eee;"></div>
        <div style="text-align: center;">
            <div style="font-size: 12px; color: #666; font-weight: 600;">ESTIMASI</div>
            <div id="infoDuration" style="font-size: 18px; font-weight: 800; color: #10b981;">0 mnt</div>
        </div>
        <button onclick="focusOnVehicle()" style="background: #0066FF; color: white; border: none; border-radius: 50px; padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px;">
            📍 Focus
        </button>
    </div>

    <div class="trip-details" id="tripDetails">
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
                <h2 id="detPlate" style="margin: 0; font-size: 22px;">-</h2>
                <p id="detDriver" style="margin: 5px 0; color: #666; font-weight: 600;">-</p>
            </div>
            <span id="detStatusBadge" class="status-badge">STATUS</span>
        </div>
        <div style="margin: 15px 0; font-size: 14px;">
            <p style="margin: 5px 0;">📍 <strong>Asal:</strong> <span id="detOrigin">-</span></p>
            <p style="margin: 5px 0;">🏁 <strong>Tujuan:</strong> <span id="detDest">-</span></p>
        </div>
        <div style="display: flex; gap: 15px; background: #F8F9FA; padding: 12px; border-radius: 10px;">
            <div style="flex: 1; text-align: center;">
                <small style="color: #666; display: block;">Jarak</small>
                <strong id="detDistance">-</strong>
            </div>
            <div style="flex: 1; text-align: center; border-left: 1px solid #ddd;">
                <small style="color: #666; display: block;">Estimasi</small>
                <strong id="detDuration">-</strong>
            </div>
        </div>

        <!-- Simulator Panel agar tidak perlu pindah tab -->
        <div class="simulator-panel" id="simPanel">
            <p style="font-size: 11px; color: #999; margin-bottom: 8px;">ADMIN SIMULATOR MODE</p>
            <button class="btn-sim" id="btnSimAction" onclick="runAdminSimulation()">🚀 Mulai Simulasi di Sini</button>
        </div>
    </div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoibW9yZW4tNjciLCJhIjoiY21vam1pbWxuMDA0bDJxb2xkZTBnM2s3cSJ9.wUfxEG062R3T-AZr_m9Fvw';
        
        let map, markers = {}, selectedTrip = null, routeCoords = [];
        let isSimulating = false, simIndex = 0;
        let is3D = false;
        let showTraffic = false;
        let terminalMarkers = [];

        async function loadTerminalsOnMap() {
            terminalMarkers.forEach(m => m.remove());
            terminalMarkers = [];
            const res = await fetch('/api/terminals/data/');
            const json = await res.json();
            json.data.forEach(t => {
                const el = document.createElement('div');
                el.style.width = '20px'; el.style.height = '20px';
                el.style.background = '#3B82F6'; el.style.borderRadius = '50%';
                el.style.border = '2px solid white'; el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.2)';
                el.style.display = 'flex'; el.style.alignItems = 'center'; el.style.justifyContent = 'center';
                el.innerHTML = '<span style="color:white; font-size:9px; font-weight:bold;">H</span>';

                const marker = new mapboxgl.Marker(el)
                    .setLngLat([t.longitude, t.latitude])
                    .setPopup(new mapboxgl.Popup({offset: 10}).setHTML(`<b>Halte: ${t.name}</b>`))
                    .addTo(map);
                terminalMarkers.push(marker);
            });
        }

        function toggleTraffic() {
            showTraffic = !showTraffic;
            const btn = document.getElementById('btnTraffic');
            btn.classList.toggle('active', showTraffic);
            if (map.getStyle().uri.includes('standard')) {
                map.setConfigProperty('basemap', 'showTraffic', showTraffic);
            } else {
                alert("Lalu lintas real-time dioptimalkan untuk mode 3D.");
            }
        }

        function initMap() {
            map = new mapboxgl.Map({
                container: 'map', style: 'mapbox://styles/mapbox/dark-v11',
                center: [107.299, -6.324], zoom: 11, pitch: 0
            });
            document.getElementById('btnStreet').classList.remove('active');
            document.getElementById('btnDark').classList.add('active');

            map.on('load', () => {
                loadTerminalsOnMap();
            });

            startPolling();
        }

        function startPolling() {
            fetchData();
            setInterval(fetchData, 2000); // Dipercepat ke 2 detik agar lebih responsif
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/active-trips/');
                const json = await res.json();
                const trips = json.data;

                renderList(trips);
                updateMarkers(trips);
                if (selectedTrip) {
                    const active = trips.find(t => t.id === selectedTrip.id);
                    if (active) {
                        selectedTrip = active;
                        updateUI(active);
                    }
                }
            } catch (err) { console.error(err); }
        }

        function renderList(trips) {
            const list = document.getElementById('tripList');
            const currentHTML = list.innerHTML;
            let newHTML = "";
            trips.forEach(trip => {
                newHTML += `
                    <button class="btn-select" onclick='selectTrip(${JSON.stringify(trip)})'>
                        <strong>${trip.vehicle_number}</strong>
                        <span style="float:right; font-size:10px;" class="status-badge status-${trip.status}">${trip.status}</span>
                        <br><small style="color:#666;">${trip.driver_name} • ${trip.origin_name}</small>
                    </button>`;
            });
            if (currentHTML !== newHTML) list.innerHTML = newHTML;
        }

        function updateMarkers(trips) {
            trips.forEach(trip => {
                if (trip.latest_location) {
                    const pos = [trip.latest_location.longitude, trip.latest_location.latitude];
                    if (markers[trip.id]) {
                        animateVehicle(trip.id, markers[trip.id].getLngLat(), pos, trip.vehicle_number);
                    } else {
                        const el = document.createElement('div');
                        el.className = 'vehicle-marker';
                        markers[trip.id] = new mapboxgl.Marker(el)
                            .setLngLat(pos)
                            .setRotationAlignment('map')
                            .addTo(map);
                        
                        carData[trip.id] = { start: [pos[0], pos[1]], end: pos, bearing: 0, startTime: performance.now(), plate: trip.vehicle_number };
                    }
                }
            });
        }

        function calculateBearing(start, end) {
            const startLat = (start.lat !== undefined ? start.lat : start[1]) * Math.PI / 180;
            const startLng = (start.lng !== undefined ? start.lng : start[0]) * Math.PI / 180;
            const endLat = (end.lat !== undefined ? end.lat : end[1]) * Math.PI / 180;
            const endLng = (end.lng !== undefined ? end.lng : end[0]) * Math.PI / 180;
            const y = Math.sin(endLng - startLng) * Math.cos(endLat);
            const x = Math.cos(startLat) * Math.sin(endLat) - Math.sin(startLat) * Math.cos(endLat) * Math.cos(endLng - startLng);
            const bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        let carData = {}; // Menyimpan data animasi mobil
        
        function animateAllCars(time) {
            let features = [];
            for (let id in carData) {
                const car = carData[id];
                const elapsed = time - car.startTime;
                const p = Math.min(elapsed / 1900, 1);
                const ease = p * (2 - p);
                
                const sLng = car.start.lng !== undefined ? car.start.lng : car.start[0];
                const sLat = car.start.lat !== undefined ? car.start.lat : car.start[1];
                const eLng = car.end.lng !== undefined ? car.end.lng : car.end[0];
                const eLat = car.end.lat !== undefined ? car.end.lat : car.end[1];
                
                const lng = sLng + (eLng - sLng) * ease;
                const lat = sLat + (eLat - sLat) * ease;
                
                features.push({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [lng, lat] },
                    properties: { bearing: car.bearing, plate: car.plate }
                });
                
                if (markers[id]) {
                    markers[id].getElement().style.display = 'block';
                    markers[id].setLngLat([lng, lat]);
                    if (Math.abs(sLng - eLng) > 0.00001) markers[id].setRotation(car.bearing);
                }
            }
            
            if (is3D && map.getSource('fleet-source')) {
                map.getSource('fleet-source').setData({ type: 'FeatureCollection', features: features });
            }
            
            requestAnimationFrame(animateAllCars);
        }
        requestAnimationFrame(animateAllCars);

        function animateVehicle(id, start, end, plate) {
            if (!carData[id]) {
                carData[id] = { start: start, end: end, bearing: 0, startTime: performance.now(), plate: plate };
            }
            
            // Ambil posisi marker saat ini sebagai titik awal (agar tidak melompat)
            const currentPos = markers[id] ? markers[id].getLngLat() : start;
            carData[id].start = [currentPos.lng || currentPos[0], currentPos.lat || currentPos[1]];
            carData[id].end = end;
            carData[id].startTime = performance.now();
            carData[id].bearing = calculateBearing(carData[id].start, end);
        }

        function selectTrip(trip) {
            selectedTrip = trip;
            document.getElementById('tripDetails').style.display = 'block';
            document.getElementById('simPanel').style.display = trip.status !== 'COMPLETED' ? 'block' : 'none';
            
            map.flyTo({ center: [trip.latest_location ? trip.latest_location.longitude : trip.origin_lng, trip.latest_location ? trip.latest_location.latitude : trip.origin_lat], zoom: 15, duration: 1000 });
            drawRoute(trip);
            updateUI(trip);
        }

        async function drawRoute(trip) {
            const start = [trip.origin_lng, trip.origin_lat];
            const end = [trip.destination_lng, trip.destination_lat];
            
            // Menggunakan profile driving-traffic agar lebih akurat dengan kondisi jalan
            const url = `https://api.mapbox.com/directions/v5/mapbox/driving-traffic/${start[0]},${start[1]};${end[0]},${end[1]}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (!data.routes[0]) return;

                routeCoords = data.routes[0].geometry.coordinates;
                const geojson = { type: 'Feature', geometry: data.routes[0].geometry };
                const sourceId = 'route';

                const layerDef = {
                    id: sourceId, type: 'line', source: sourceId,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 'line-color': '#0066FF', 'line-width': 6, 'line-opacity': 0.5 }
                };
                if (is3D) layerDef.slot = 'middle';

                if (map.getSource(sourceId)) {
                    map.getSource(sourceId).setData(geojson);
                    // Pastikan layer tetap ada, karena setStyle(3D) menghapus semua layer
                    if (!map.getLayer(sourceId)) {
                        map.addLayer(layerDef);
                    }
                } else {
                    map.addSource(sourceId, { type: 'geojson', data: geojson });
                    map.addLayer(layerDef);
                }
                
                document.getElementById('detDistance').textContent = (data.routes[0].distance / 1000).toFixed(1) + " km";
                document.getElementById('detDuration').textContent = Math.round(data.routes[0].duration / 60) + " mnt";
            } catch (e) { console.error("Gagal menggambar rute:", e); }
        }

        function updateUI(trip) {
            document.getElementById('detPlate').textContent = trip.vehicle_number;
            document.getElementById('detDriver').textContent = trip.driver_name;
            document.getElementById('detOrigin').textContent = trip.origin_name;
            document.getElementById('detDest').textContent = trip.destination_name;
            const badge = document.getElementById('detStatusBadge');
            badge.textContent = trip.status;
            badge.className = `status-badge status-${trip.status}`;
        }

        // --- ADMIN SIMULATOR MODE ---
        // Anda bisa menjalankan simulasi langsung dari sini tanpa buka tab Driver
        async function runAdminSimulation() {
            if (isSimulating) return;
            if (routeCoords.length === 0) return alert("Rute belum dimuat!");

            isSimulating = true;
            const btn = document.getElementById('btnSimAction');
            btn.textContent = "⌛ Simulasi Berjalan...";
            btn.style.background = "#FF3B30";

            // Otomatis ubah status ke ON_GOING jika masih SCHEDULED
            if (selectedTrip.status === 'SCHEDULED') {
                await fetch(`/api/trip/${selectedTrip.id}/status/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: 'ON_GOING' })
                });
                selectedTrip.status = 'ON_GOING';
                updateUI(selectedTrip);
            }

            for (let i = 0; i < routeCoords.length; i++) {
                if (!isSimulating) break;
                const [lng, lat] = routeCoords[i];
                
                // Kirim koordinat ke server seolah-olah dari HP Driver
                await fetch('/api/update-location/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ trip_id: selectedTrip.id, latitude: lat, longitude: lng })
                });

                // Tunggu 1 detik tiap langkah agar terlihat nyata
                await new Promise(r => setTimeout(r, 1000));
                
                // Berhenti jika sampai ujung
                if (i === routeCoords.length - 1) {
                    alert("Simulasi Selesai! Kendaraan telah sampai di tujuan.");
                    isSimulating = false;
                }
            }
            
            btn.textContent = "🚀 Mulai Simulasi di Sini";
            btn.style.background = "#0066FF";
            isSimulating = false;
        }

        function set3DLight(preset) {
            if (!is3D) return;
            try {
                map.setConfigProperty('basemap', 'lightPreset', preset);
                document.getElementById('lBtnDay').style.opacity = preset === 'day' ? '1' : '0.4';
                document.getElementById('lBtnNight').style.opacity = preset === 'dusk' ? '1' : '0.4';
            } catch (e) { console.warn("Hanya untuk mode 3D Standard."); }
        }

        function focusOnVehicle() {
            if (selectedTrip && selectedTrip.latest_location) {
                map.flyTo({ 
                    center: [selectedTrip.latest_location.longitude, selectedTrip.latest_location.latitude], 
                    zoom: 16, pitch: 45, duration: 1500 
                });
            }
        }
        function toggle3D() {
            is3D = !is3D;
            const btn = document.getElementById('btn3D');
            const lightBox = document.getElementById('lightControls');
            if (is3D) {
                btn.style.background = '#059669'; 
                lightBox.style.display = 'flex';
                map.setStyle('mapbox://styles/mapbox/standard');
                document.querySelectorAll('.map-style-toggle button:not(#btn3D)').forEach(b => b.classList.remove('active'));
                
                map.once('style.load', () => {
                    map.setConfigProperty('basemap', 'lightPreset', 'day'); // Default pagi
                    if (showTraffic) map.setConfigProperty('basemap', 'showTraffic', true);
                    map.easeTo({ pitch: 65, bearing: -20, duration: 2000, zoom: Math.max(map.getZoom(), 16) });
                    
                    Object.values(markers).forEach(m => m.remove());
                    markers = {}; carData = {}; 
                    
                    fetchData().then(() => { if (selectedTrip) drawRoute(selectedTrip); });
                    loadTerminalsOnMap();
                });
            } else {
                btn.style.background = '#10b981';
                lightBox.style.display = 'none';
                setMapStyle('dark');
                map.easeTo({ pitch: 0, bearing: 0, duration: 1000 });
            }
        }

        // Fungsi manual 3D dihapus karena Mapbox Standard sudah memilikinya secara otomatis.

        function setMapStyle(mode) {
            is3D = false; 
            document.getElementById('btn3D').style.background = '#10b981';
            document.getElementById('lightControls').style.display = 'none';
            
            const styles = {
                'streets': 'mapbox://styles/mapbox/streets-v12',
                'satellite': 'mapbox://styles/mapbox/satellite-streets-v12',
                'dark': 'mapbox://styles/mapbox/dark-v11'
            };
            const styleUrl = styles[mode] || styles['streets'];
            map.setStyle(styleUrl);
            document.querySelectorAll('.map-style-toggle button:not(#btn3D)').forEach(b => b.classList.remove('active'));
            document.getElementById(mode === 'streets' ? 'btnStreet' : mode === 'satellite' ? 'btnSatellite' : 'btnDark').classList.add('active');
            
            map.once('style.load', () => {
                Object.values(markers).forEach(m => m.remove());
                markers = {}; 
                fetchData().then(() => {
                    if (selectedTrip) drawRoute(selectedTrip);
                });
            });
        }

        initMap();
    </script>
</body>
</html>
