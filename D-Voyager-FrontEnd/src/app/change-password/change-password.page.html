<ion-header class="ion-no-border custom-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/edit-profile" icon="arrow-back" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Ganti Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="custom-bg">
  <div class="password-container">
    <div class="header-section">
      <div class="logo-box">
        <ion-icon name="lock-closed"></ion-icon>
      </div>
      <h1>Ganti Password</h1>
      <p>Password baru minimal 8 karakter</p>
    </div>

    <form class="form-section" (ngSubmit)="submit()">
      <div class="input-group" *ngIf="hasPassword">
        <ion-label class="custom-label">Password Lama</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="key-outline" slot="start"></ion-icon>
          <ion-input [type]="showCurrentPassword ? 'text' : 'password'" name="current" [(ngModel)]="currentPassword" placeholder="Masukkan password lama" autocomplete="current-password" required></ion-input>
          <ion-icon [name]="showCurrentPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="password-toggle" (click)="showCurrentPassword = !showCurrentPassword"></ion-icon>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">Password Baru</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input [type]="showNewPassword ? 'text' : 'password'" name="new" [(ngModel)]="newPassword" placeholder="Minimal 8 karakter" minlength="8" autocomplete="new-password" required></ion-input>
          <ion-icon [name]="showNewPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="password-toggle" (click)="showNewPassword = !showNewPassword"></ion-icon>
        </ion-item>
      </div>

      <div class="password-strength">
        <div class="strength-bar">
          <div class="bar" [ngStyle]="{ 'width.%': (passwordStrength().score / 5) * 100, 'background': passwordStrength().score >=4 ? '#2ecc71' : (passwordStrength().score >=3 ? '#f1c40f' : '#e74c3c') }"></div>
        </div>
        <div class="strength-label">Kekuatan: {{ passwordStrength().label }}</div>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">Konfirmasi Password Baru</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
          <ion-input [type]="showConfirmPassword ? 'text' : 'password'" name="confirm" [(ngModel)]="confirmPassword" placeholder="Ulangi password baru" minlength="8" autocomplete="new-password" required></ion-input>
          <ion-icon [name]="showConfirmPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="password-toggle" (click)="showConfirmPassword = !showConfirmPassword"></ion-icon>
        </ion-item>
      </div>

      <div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>

      <ion-button expand="block" type="submit" class="save-btn" [disabled]="isSaving">
        <ion-spinner *ngIf="isSaving" name="crescent"></ion-spinner>
        <span>{{ isSaving ? 'Menyimpan...' : 'Simpan Password' }}</span>
      </ion-button>
    </form>
  </div>
</ion-content>
