<ion-content class="custom-bg">
  <div class="login-container">
    <!-- Header Section -->
    <div class="header-section">
      <div class="logo-box">
        <img src="assets/Logo_Dvoyager_No_Bg.png" alt="D-Voyager Logo">
      </div>
      <h1>D-Voyager</h1>
      <p>Login to your account</p>
    </div>

    <!-- Login Form -->
    <div class="form-section">
      <div class="input-group">
        <ion-label class="custom-label">Email</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input type="email" placeholder="Enter your email" required [(ngModel)]="email"></ion-input>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">Password</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Enter your password" required [(ngModel)]="password"></ion-input>
          <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="password-toggle" (click)="showPassword = !showPassword"></ion-icon>
        </ion-item>
      </div>

      <div class="forgot-password">
        <a routerLink="/forgot-password">Forgot Password?</a>
      </div>

      <ion-button expand="block" class="custom-btn" (click)="login()">
        Login
      </ion-button>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <ion-button expand="block" fill="outline" class="google-btn" (click)="loginWithGoogle()">
        <ion-icon slot="start" name="logo-google"></ion-icon>
        Continue with Google
      </ion-button>
    </div>
    
    <!-- Sign Up Link -->
    <div class="signup-section">
      <p>Don't have an account? <a routerLink="/signup">Sign Up</a></p>
      <p style="margin-top: 10px;">Are you a driver? <a routerLink="/driver-login">Login as Driver</a></p>
    </div>
  </div>
</ion-content>
