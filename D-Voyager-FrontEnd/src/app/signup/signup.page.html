<ion-header class="ion-no-border custom-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" icon="arrow-back" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Create Account</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="custom-bg">
  <div class="login-container">
    <!-- Header Section -->
    <div class="header-section">
      <div class="logo-box">
        <img src="assets/Logo_Dvoyager_No_Bg.png" alt="D-Voyager Logo">
      </div>
      <h1>Create Account</h1>
      <p>Join D-Voyager today</p>
    </div>

    <!-- Sign Up Form -->
    <form class="form-section" (ngSubmit)="signup()">
      <div class="input-group">
        <ion-label class="custom-label">Full Name</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-input
            type="text"
            name="fullName"
            [(ngModel)]="fullName"
            placeholder="Enter your full name"
            autocomplete="name"
            maxlength="50"
            required>
          </ion-input>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">Email</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Enter your email"
            autocomplete="email"
            required>
          </ion-input>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">Phone Number</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="call-outline" slot="start"></ion-icon>
          <ion-input
            type="tel"
            name="phone"
            [(ngModel)]="phone"
            placeholder="Enter your phone number"
            autocomplete="tel"
            required>
          </ion-input>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">Password</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            placeholder="Create at least 8 characters"
            minlength="8"
            autocomplete="new-password"
            required>
          </ion-input>
          <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="password-toggle" (click)="showPassword = !showPassword"></ion-icon>
        </ion-item>
      </div>

      <div class="input-group">
        <ion-label class="custom-label">Confirm Password</ion-label>
        <ion-item class="custom-input-item" lines="none">
          <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
          <ion-input
            [type]="showConfirmPassword ? 'text' : 'password'"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Confirm your password"
            minlength="8"
            autocomplete="new-password"
            required>
          </ion-input>
          <ion-icon [name]="showConfirmPassword ? 'eye-outline' : 'eye-off-outline'" slot="end" class="password-toggle" (click)="showConfirmPassword = !showConfirmPassword"></ion-icon>
        </ion-item>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <ion-button expand="block" type="submit" class="custom-btn" [disabled]="isLoading">
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span>{{ isLoading ? 'Creating account...' : 'Sign Up' }}</span>
      </ion-button>
    </form>
    
    <!-- Login Link -->
    <div class="signup-section">
      <p>Already have an account? <a routerLink="/login">Log In</a></p>
    </div>
  </div>
</ion-content>
